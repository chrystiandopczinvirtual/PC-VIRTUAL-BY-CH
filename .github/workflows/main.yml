name: RDP-Windows11

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-2022
    timeout-minutes: 3600

    steps:
      # 🔥 REMOÇÃO TOTAL DO TEST MODE (SEM REBOOT)
      - name: Force Remove Test Mode (No Reboot)
        run: |
          Write-Host "=== REMOVENDO TEST MODE COMPLETAMENTE (sem reboot) ==="
          
          bcdedit /set testsigning off 2>$null
          bcdedit /set nointegritychecks off 2>$null
          bcdedit /set debug off 2>$null
          bcdedit /set hypervisorlaunchtype off 2>$null
          
          $bootConfig = Get-WmiObject -Namespace "root\wmi" -Class "WmiMonitorID" -ErrorAction SilentlyContinue
          if ($bootConfig) {
              Invoke-WmiMethod -Namespace "root\wmi" -Class "WmiMonitorID" -Name "WmiRefresh" -ErrorAction SilentlyContinue
          }
          
          gpupdate /force /boot 2>$null
          
          Restart-Service -Name "CryptSvc" -Force -ErrorAction SilentlyContinue
          Restart-Service -Name "TrustedInstaller" -Force -ErrorAction SilentlyContinue
          Restart-Service -Name "KtmRm" -Force -ErrorAction SilentlyContinue
          
          pnputil /scan-devices 2>$null
          certutil -URLCache * delete 2>$null
          
          Remove-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" `
                               -Name "LegalNoticeText" -Force -ErrorAction SilentlyContinue
          Remove-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" `
                               -Name "LegalNoticeCaption" -Force -ErrorAction SilentlyContinue
          Remove-ItemProperty -Path "HKCU:\Control Panel\Desktop" `
                               -Name "PaintDesktopVersion" -Force -ErrorAction SilentlyContinue
          
          Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2
          Start-Process explorer -ErrorAction SilentlyContinue
          
          $status = bcdedit /enum | Select-String "testsigning"
          if ($status -match "off" -or $status -match "No") {
              Write-Host "✅ TEST MODE REMOVIDO COM SUCESSO!"
          } else {
              Write-Host "⚠️ Test Mode ainda está ativo"
          }
          
          Write-Host ""
          Write-Host "📊 STATUS ATUAL:"
          bcdedit /enum | Select-String "testsigning|nointegritychecks|debug|hypervisorlaunchtype"

      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) +
                         [char[]](91..96) + [char[]](123..126))
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          
          echo "RDP_CREDS=User: RDP | Password: $password" >> $env:GITHUB_ENV
          
          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID
          
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          
          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned. Exiting."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
      
      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port 3389 failed"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      # 🔥 PASSO CORRIGIDO: usa Winget nativo (sem Appx)
      - name: Install Windows 11 Optional Features (Winget)
        run: |
          Write-Host "=== Instalando ferramentas via Winget ==="
          
          # Verifica se Winget está disponível
          if (Get-Command winget -ErrorAction SilentlyContinue) {
              Write-Host "✅ Winget encontrado!"
              
              # Instala Windows Terminal
              winget install --id Microsoft.WindowsTerminal -e --silent 2>$null
              
              # Instala PowerShell 7
              winget install --id Microsoft.PowerShell -e --silent 2>$null
              
              # Instala outros utilitários (opcional)
              winget install --id Git.Git -e --silent 2>$null
              winget install --id Microsoft.VisualStudioCode -e --silent 2>$null
              
              Write-Host "✅ Ferramentas instaladas com sucesso!"
          } else {
              Write-Host "⚠️ Winget não encontrado. Pulando instalação."
              Write-Host "ℹ️  Os runners Windows 2022 já têm Winget disponível."
          }

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: $(echo $env:RDP_CREDS)"
          Write-Host "==================`n"
          Write-Host "✅ TEST MODE: REMOVIDO TOTALMENTE"
          Write-Host "✅ Ferramentas Windows 11 instaladas via Winget"
          
          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - Use Ctrl+C in workflow to terminate"
              Start-Sleep -Seconds 300
          }
