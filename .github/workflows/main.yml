name: Cloud-Gaming-VPS-PRO-MAX

on:
  workflow_dispatch:

jobs:
  cloud-gaming-pro-max:
    runs-on: windows-2022
    timeout-minutes: 3600

    steps:
      # =============================================
      # 1. OTIMIZAÇÃO DE CPU
      # =============================================
      - name: ⚡ CPU Affinity & Priority
        run: |
          Write-Host "=== OTIMIZANDO CPU ==="
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile" `
                           -Name "SystemResponsiveness" -Value 0 -Force
          powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          powercfg -setacvalueindex scheme_current sub_processor 0cc5b647-c1df-4637-891a-dec35c318583 0
          powercfg -setacvalueindex scheme_current sub_processor 54533251-82be-4824-96c1-47b60b740d00 0
          powercfg -setactive scheme_current
          Write-Host "✅ CPU otimizada"

      # =============================================
      # 2. GPU VIRTUAL (WARP + D3D11)
      # =============================================
      - name: 🎮 GPU Virtual (WARP + D3D11)
        run: |
          Write-Host "=== CRIANDO GPU VIRTUAL ==="
          New-Item -Path "HKLM:\SOFTWARE\Microsoft\Direct3D\Drivers" -Force -ErrorAction SilentlyContinue | Out-Null
          New-Item -Path "HKLM:\SOFTWARE\Microsoft\Direct3D\WARP" -Force -ErrorAction SilentlyContinue | Out-Null
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Direct3D\Drivers" `
                           -Name "SoftwareOnly" -Value 1 -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Direct3D" `
                           -Name "DisableHWAcceleration" -Value 1 -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Direct3D\WARP" `
                           -Name "MaxThreads" -Value 0 -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Direct3D\WARP" `
                           -Name "MemoryLimit" -Value 2048 -Force -ErrorAction SilentlyContinue
          Write-Host "✅ GPU Virtual criada: WARP (D3D11 via software)"

      # =============================================
      # 3. RAM COMPRESSION
      # =============================================
      - name: 🧠 RAM Compression
        run: |
          Write-Host "=== OTIMIZANDO MEMÓRIA ==="
          Enable-MMAgent -MemoryCompression
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management" `
                           -Name "LargeSystemCache" -Value 1 -Force
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management" `
                           -Name "DisablePagingExecutive" -Value 1 -Force
          Write-Host "✅ RAM otimizada: compactação ativa"

      # =============================================
      # 4. NETWORK KILLER (BAIXA LATÊNCIA)
      # =============================================
      - name: 🌐 Network Killer (Low Latency)
        run: |
          Write-Host "=== OTIMIZANDO REDE ==="
          Get-ChildItem -Path "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters\Interfaces" | ForEach-Object {
              Set-ItemProperty -Path $_.PSPath -Name "TcpAckFrequency" -Value 1 -Force -ErrorAction SilentlyContinue
              Set-ItemProperty -Path $_.PSPath -Name "TCPNoDelay" -Value 1 -Force -ErrorAction SilentlyContinue
          }
          netsh int tcp set global autotuninglevel=normal
          netsh int tcp set global chimney=disabled
          netsh int tcp set global rss=enabled
          netsh int tcp set global timestamps=disabled
          netsh int tcp set global initialRto=2000
          Write-Host "✅ Rede otimizada"

      # =============================================
      # 5. GAME MODE + POWER PLAN
      # =============================================
      - name: 🎯 Game Mode + Power Plan
        run: |
          Write-Host "=== ATIVANDO GAME MODE ==="
          New-Item -Path "HKCU:\SOFTWARE\Microsoft\GameBar" -Force -ErrorAction SilentlyContinue | Out-Null
          Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\GameBar" -Name "AllowAutoGameMode" -Value 1 -Force
          Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\GameBar" -Name "AutoGameModeEnabled" -Value 1 -Force
          powercfg -setacvalueindex scheme_current sub_processor 0cc5b647-c1df-4637-891a-dec35c318583 100
          powercfg -setactive scheme_current
          Write-Host "✅ Game Mode ativado"

      # =============================================
      # 6. WINDOWS DEFENDER KILLER
      # =============================================
      - name: 🔥 Windows Defender Killer
        run: |
          Write-Host "=== DESATIVANDO WINDOWS DEFENDER ==="
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBehaviorMonitoring $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBlockAtFirstSeen $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableIOAVProtection $true -ErrorAction SilentlyContinue
          Stop-Service -Name WinDefend -Force -ErrorAction SilentlyContinue
          Set-Service -Name WinDefend -StartupType Disabled -ErrorAction SilentlyContinue
          Write-Host "✅ Windows Defender desativado"

      # =============================================
      # 7. TEMP FILES CLEANER
      # =============================================
      - name: 🧹 Temp Files Cleaner
        run: |
          Write-Host "=== LIMPANDO ARQUIVOS TEMPORÁRIOS ==="
          Remove-Item -Path "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "$env:WINDIR\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
          Clear-RecycleBin -Force -ErrorAction SilentlyContinue
          Write-Host "✅ Limpeza concluída"

      # =============================================
      # 8. REMOVE TEST MODE (VISUAL)
      # =============================================
      - name: Remove Test Mode
        run: |
          bcdedit /set testsigning off 2>$null
          bcdedit /set nointegritychecks off 2>$null
          Remove-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" `
                               -Name "LegalNoticeText" -Force -ErrorAction SilentlyContinue
          Remove-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" `
                               -Name "LegalNoticeCaption" -Force -ErrorAction SilentlyContinue
          Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2
          Start-Process explorer -ErrorAction SilentlyContinue

      # =============================================
      # 9. CONFIGURA RDP + FIREWALL (LIBERA PORTAS)
      # =============================================
      - name: Configure RDP & Firewall
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                           -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                           -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                           -Name "SecurityLayer" -Value 0 -Force
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
                           -Name "MaxMonitors" -Value 1 -Force
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
                           -Name "MaxXResolution" -Value 1920 -Force
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
                           -Name "MaxYResolution" -Value 1080 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          # Portas para Sunshine (caso instale depois)
          netsh advfirewall firewall add rule name="Sunshine-TCP" dir=in action=allow protocol=TCP localport=47984-48010
          netsh advfirewall firewall add rule name="Sunshine-UDP" dir=in action=allow protocol=UDP localport=47998-48010
          Restart-Service -Name TermService -Force

      # =============================================
      # 10. CRIA USUÁRIO LOCAL
      # =============================================
      - name: Create User
        run: |
          Add-Type -AssemblyName System.Security
          $password = -join ((65..90) + (97..122) + (48..57) + (33..47) | Get-Random -Count 14 | ForEach-Object { [char]$_ })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "Game" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "Game"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Game"
          echo "USER_PASS=Usuário: Game | Senha: $password" >> $env:GITHUB_ENV

      # =============================================
      # 11. INSTALA TAILSCALE
      # =============================================
      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      # =============================================
      # 12. CONECTA TAILSCALE
      # =============================================
      - name: Connect Tailscale
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gaming-pro-$env:GITHUB_RUN_ID
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

          
      # =============================================
      # 15. MOSTRA INFORMAÇÕES DE ACESSO
      # =============================================
      - name: Show Access Info
        run: |
          Clear-Host
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════════════╗"
          Write-Host "║                                                                     ║"
          Write-Host "║            🔥 PC VIRTUAL PRO MAX - PRONTO PRA USAR                  ║"
          Write-Host "║                                                                     ║"
          Write-Host "╠══════════════════════════════════════════════════════════════════════╣"
          Write-Host "║                                                                     ║"
          Write-Host "║  🌐 Tailscale IP: $env:TAILSCALE_IP                                    ║"
          Write-Host "║  👤 Usuário RDP: Game                                                ║"
          Write-Host "║  🔑 Senha RDP: $(echo $env:USER_PASS)                               ║"
          Write-Host "║                                                                     ║"
          Write-Host "╠══════════════════════════════════════════════════════════════════════╣"
          Write-Host "║                                                                     ║"
          Write-Host "║  ⚡ OTIMIZAÇÕES APLICADAS:                                           ║"
          Write-Host "║   ✅ CPU Affinity + Priority                                        ║"
          Write-Host "║   ✅ GPU Virtual (WARP D3D11)                                       ║"
          Write-Host "║   ✅ RAM Compression                                                ║"
          Write-Host "║   ✅ Network Killer (latência reduzida)                             ║"
          Write-Host "║   ✅ Game Mode + Power Plan                                         ║"
          Write-Host "║   ✅ Windows Defender desativado                                    ║"
          Write-Host "║   ✅ Temp Files Cleaned                                             ║"
          Write-Host "║                                                                     ║"
          Write-Host "╠══════════════════════════════════════════════════════════════════════╣"
          Write-Host "║                                                                     ║"
          Write-Host "║  🖥️  PRÓXIMO PASSO:                                                  ║"
          Write-Host "║   Conecte via RDP e instale MANUALMENTE o Sunshine ou Parsec        ║"
          Write-Host "║   Sunshine: https://github.com/LizardByte/Sunshine                 ║"
          Write-Host "║   Parsec:   https://parsec.app                                    ║"
          Write-Host "║                                                                     ║"
          Write-Host "║  🔗 Portas já liberadas: 47984-48010 (TCP/UDP)                     ║"
          Write-Host "║                                                                     ║"
          Write-Host "╚══════════════════════════════════════════════════════════════════════╝"
          Write-Host ""

      # =============================================
      # 16. KEEP ALIVE (6 HORAS)
      # =============================================
      - name: Keep Alive
        run: |
          Write-Host "✅ PC Virtual PRO MAX ativo!"
          Write-Host "⏱️  Sessão: 6 horas (limite do GitHub)"
          Write-Host "🎮 GPU Virtual: WARP ativo"
          Write-Host "📦 Sunshine/Parsec: instale manualmente"
          Write-Host ""
          while ($true) {
              Write-Host "[$(Get-Date)] 🟢 Servidor ativo - RDP na porta 3389"
              Start-Sleep -Seconds 300
          }
